name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r quick-notes-${{ github.ref_name }}.zip manifest.json popup.html popup.css popup.js background.js content.js content.css icons/ README.md CHANGELOG.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: quick-notes-${{ github.ref_name }}.zip
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
